<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Music Empire 🎵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d26;
    --border: #2a2d3a;
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --accent4: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-icon { font-size: 24px; filter: drop-shadow(0 0 8px #7c3aed88); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #10b98115;
    border: 1px solid #10b98133;
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--accent4);
    font-weight: 500;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent4); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.2)} }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .refresh-btn:hover { background: var(--border); color: var(--text); }

  /* MAIN */
  main {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* REVENUE TARGET HERO */
  .hero {
    background: linear-gradient(135deg, #1e1030 0%, #0f1a2e 100%);
    border: 1px solid #7c3aed33;
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, #7c3aed22, transparent 70%);
    pointer-events: none;
  }

  .hero-left h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .hero-left p {
    color: var(--muted);
    font-size: 14px;
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat .val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    display: block;
  }

  .hero-stat .lbl {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .progress-section {
    min-width: 200px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #7c3aed, #06b6d4);
    transition: width 1s ease;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 16px;
  }

  /* CHANNELS GRID */
  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .channel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, border-color .2s;
  }

  .channel-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent-color);
  }

  .channel-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-color);
  }

  .ch1 { --accent-color: #7c3aed; }
  .ch2 { --accent-color: #06b6d4; }
  .ch3 { --accent-color: #f59e0b; }
  .ch4 { --accent-color: #10b981; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .channel-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .channel-avatar {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .channel-name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 3px;
  }

  .channel-niche {
    font-size: 12px;
    color: var(--muted);
  }

  .badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 100px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-live { background: #10b98120; color: #10b981; border: 1px solid #10b98133; }
  .badge-setup { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b33; }
  .badge-pending { background: #64748b20; color: #64748b; border: 1px solid #64748b33; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    display: block;
    margin-bottom: 2px;
  }

  .stat-lbl {
    font-size: 11px;
    color: var(--muted);
  }

  /* SPARKLINE */
  .sparkline-wrap {
    background: var(--surface2);
