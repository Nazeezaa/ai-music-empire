name: AI Music Empire - Daily Pipeline

on:
  schedule:
        - cron: '0 15 */2 * *'  # Runs at 15:00 UTC every other day
  workflow_dispatch:
    inputs:
      genre:
        description: 'Music genre (e.g., lofi, ambient, jazz)'
        required: false
        default: 'lofi'
      mood:
        description: 'Music mood (e.g., chill, energetic, focus)'
        required: false
        default: 'chill'
      tracks:
        description: 'Number of tracks to generate (default from config)'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
              SUNO_COOKIE: ${{ secrets.SUNO_COOKIE }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify FFmpeg installation
        run: ffmpeg -version

      - name: Run full pipeline
        run: python run_pipeline.py

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: pipeline.log
          retention-days: 30

      - name: Upload output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.run_number }}
          path: output/
          retention-days: 7
