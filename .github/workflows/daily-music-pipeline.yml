name: AI Music Empire - Daily Pipeline

on:
  schedule:
    - cron: '0 15 * * *'→ Runs at 15:00
  workflow_dispatch:
    inputs:
      genre:
        description: 'Music genre (e.g., lofi, ambient, jazz)'
        required: false
        default: 'lofi'
      mood:
        description: 'Music mood (e.g., chill, energetic, focus)'
        required: false
        default: 'chill'

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    env:
      KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
