name: AI Music Empire - Smart Agent

on:
  # Run after the main pipeline completes
  workflow_run:
    workflows: ["AI Music Pipeline"]
    types:
      - completed

  # Scheduled runs
  schedule:
    # Trend analysis every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
    # Weekly report every Sunday at 20:00 UTC
    - cron: "0 20 * * 0"

  # Manual trigger
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - trends
          - ab_tests
          - weekly_report
          - agent_only

env:
  PYTHON_VERSION: "3.11"
  YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  AGENT_CONFIG: "agent_config.yaml"

jobs:
  # Smart Agent (runs after main pipeline)
  smart-agent:
    name: Smart Agent
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'full' || github.event.inputs.task == 'agent_only')
      || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: agent-data-${{ github.run_number }}
          restore-keys: agent-data-

      - name: Run Smart Agent
        run: python smart_agent.py

      - name: Save data cache
        uses: actions/cache/save@v4
        with:
          path: data/
          key: agent-data-${{ github.run_number }}

      - name: Upload learning history
        uses: actions/upload-artifact@v4
        with:
          name: learning-history
          path: data/learning_history.json
          retention-days: 30

  # Trend Analysis (Monday)
  trend-analysis:
    name: Trend Analysis
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1')
      || (github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.task == 'full' || github.event.inputs.task == 'trends'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Restore trend cache
        uses: actions/cache@v4
        with:
          path: data/
          key: trend-data-${{ github.run_number }}
          restore-keys: trend-data-

      - name: Run Trend Analyzer
        run: python trend_analyzer.py

      - name: Upload trend results
        uses: actions/upload-artifact@v4
        with:
          name: trend-results
          path: data/trend_results.json
          retention-days: 14

  # A/B Test Evaluation
  ab-testing:
    name: A/B Test Evaluation
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.task == 'full' || github.event.inputs.task == 'ab_tests')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Restore test data
        uses: actions/cache@v4
        with:
          path: data/
          key: ab-data-${{ github.run_number }}
          restore-keys: ab-data-

      - name: Run A/B Test Evaluation
        run: python ab_testing.py

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ab-test-results
          path: data/ab_tests.json
          retention-days: 14

  # Weekly Report (Sunday)
  weekly-report:
    name: Weekly Report
    runs-on: ubuntu-latest
    needs: [smart-agent, trend-analysis, ab-testing]
    if: >
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 20 * * 0')
        || (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.task == 'full' || github.event.inputs.task == 'weekly_report'))
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Generate Weekly Report
        run: python weekly_report.py

      - name: Upload weekly report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: reports/
          retention-days: 90

      - name: Commit report to repo
        run: |
          git config user.name "AI Music Bot"
          git config user.email "bot@ai-music-empire.com"
          git add reports/ data/ || true
          git diff --cached --quiet || git commit -m "Weekly report $(date +%Y-%m-%d)"
          git push || true
